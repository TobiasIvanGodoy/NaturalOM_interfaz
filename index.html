<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natural OM</title>

    <link rel="icon" type="image/jpg" href="diseño/logo_sin_redes.jpg">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="overlay" class="sombra oculto">
        <div id="contenedor" class="contenedor">
            <div id="cerrar"></div>
        </div>

        <div id="informacion" class="oculto"></div>
    </div>

    <div id="superior" class="contenedorHUD animacion1">
        <p id="saldo"></p>
        <img
            id="logo"
            src="diseño/logo_sin_redes.jpg"
            alt="Logo de Natural OM">
    </div>

    <div class="contenedorSeccion animacion1">

        <div id="productos" class="contenedorTablas">
            <table id="tablaProductos">
                <tr>
                    <th>Producto</th>
                    <th>Precio</th>
                    <th>Cantidad</th>
                </tr>
            </table>
        </div>

        <div id="movimientos" class="contenedorTablas">
            <table id="tablaMovimientos">
                <tr>
                    <th>Fecha</th>
                    <th>Mensaje</th>
                    <th>Monto</th>
                </tr>
            </table>
        </div>

    </div>

    <div id="inferior" class="contenedorHUD animacion1">
        <button id="btnProducto">
            Agregar producto
        </button>

        <button id="btnMovimiento">
            Agregar movimiento
        </button>
    </div>

    <script src="script.js"></script>

</body>

</html>
