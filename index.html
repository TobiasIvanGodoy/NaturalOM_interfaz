<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Natural OM </title>
    <link rel="icon" type="image/jpg" href="diseño/logo_sin_redes.jpg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sombra">
        <div class="contenedor">
            <div class="campo">
                <label for="producto">Producto</label>
                <input
                    type="text"
                    id="producto"
                    placeholder="Ingrese nombre del producto">
            </div>
            <div class="campo">
                <label for="precio">Precio</label>
                <input
                    type="number"
                    id="precio"
                    placeholder="Ingrese el precio producto">
            </div>
            <div class="campo">
                <label for="cantidad">Cantidad</label>
                <input
                    type="number"
                    id="cantidad"
                    placeholder="Ingrese el stock actual del producto">
            </div>
            <button> Confirmar </button>
        </div>
    </div>
    
    <div id="superior" class="contenedorHUD animacion1">
        <p id="saldo">$1.500.000</p> <!-- Aca despues voy a implementar que se muestre el balance de la cuenta -->
        <img src="diseño/logo_sin_redes.jpg" id="logo"></img>
    </div>
    <div  class="contenedorSeccion animacion1">
        <div id="productos" class="contenedorTablas">
            <table>
                <tr>
                    <th>producto</th>
                    <th>precio</th>
                    <th>cantidad</th>
                </tr>
            </table>
        </div>
        <div id="movimientos" class="contenedorTablas">
            <table>
                <tr>
                    <th>fecha</th>
                    <th>mensaje</th>
                    <th>monto</th>
                </tr>
            </table>
        </div>
    </div>
    <div id="inferior" class="contenedorHUD animacion1">
        <button id="btnProducto">
            <p>Agregar producto</p>
        </button>
        <button id="btnMovimiento">
            <p>Agregar movimiento</p>
        </button>
    </div>
    <script src="script.js"></script>
</body>
