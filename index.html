<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natural OM</title>

    <link rel="icon" type="image/jpg" href="diseño/logo_sin_redes.jpg">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="overlay" class="sombra oculto">
    </div>

    <div id="superior" class="contenedorRow animacion1">
        <p id="saldo">$450.000</p>
    </div>

    <div id= "seccionActual" class="contenedorSeccion animacion1">
        <div id="panelIncial">
            <img
            id="logo"
            src="diseño/logo_sin_redes.jpg"
            alt="Logo de Natural OM">
            <p>Hola!</p>
        </div>
    </div>

    <div id="inferior" class="contenedorRow animacion1">
        <button 
        id="btnProducto" 
        class="btnSeccion">
        <img src="diseño/productos.png" alt="Productos">
        </button>

        <button id="btnMovStock" 
        class="btnSeccion">
        <img src="diseño/mov_stock.png" alt="movimientos de stock">
        </button>

        <button id="btnGastos" 
        class="btnSeccion">
        <img src="diseño/gastos.png" alt="Gastos">
        </button>

        <button id="btnDistribuidores" 
        class="btnSeccion">
        <img src="diseño/distribuidores.png" alt="Distribuitores">
        </button>

        <button id="btnStats" 
        class="btnSeccion">
        <img src="diseño/estadisticas.png" alt="Estadisticas">
        </button>
    </div>

<script src="script.js"></script>

</body>

</html>
