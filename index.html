<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Natural OM </title>
    <link rel="icon" type="image/jpg" href="diseño/logo_sin_redes.jpg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="overlay" class="sombra oculto">
        <div id="agregarProducto" class="contenedor oculto">
            <div class="campo">
                <label for="producto">Producto</label>
                <input
                    type="text"
                    id="producto"
                    placeholder="Nombre del producto...">
            </div>
            <div class="campo">
                <label for="precio">Precio</label>
                <input
                    type="number"
                    id="precio"
                    placeholder="Ingrese el precio...">
            </div>
            <div class="campo">
                <label for="cantidad">Cantidad</label>
                <input
                    type="number"
                    id="cantidad"
                    placeholder="Stock actual...">
            </div>
            <button id="btnConfirmarP"> Confirmar </button>

        </div>
        <div id="agregarMovimiento" class="contenedor oculto">
            <div class="campo">
                <label for="descripcion">Descripción</label>
                <input
                    type="text"
                    id="descripcion"
                    placeholder="Describí el movimiento...">
            </div>
            <div class="campo">
                <label for="monto">Monto</label>
                <input
                    type="number"
                    id="precio"
                    placeholder="Ingresa el monto...">
            </div>
            <div class="campo">
                <button id="btnGasto"></button>
                <p>Gasto</p>
            </div>
            <button id="btnConfirmarM"> Confirmar </button>
        </div>

        <div id="mensaje" class="contenedor oculto">
        </div>
    </div>
    
    <div id="superior" class="contenedorHUD animacion1">
        <p id="saldo"> </p>
        <img src="diseño/logo_sin_redes.jpg" id="logo"></img>
    </div>
    <div  class="contenedorSeccion animacion1">
        <div id="productos" class="contenedorTablas">
            <table id="tablaProductos">
                <tr>
                    <th>producto</th>
                    <th>precio</th>
                    <th>cantidad</th>
                </tr>
            </table>
        </div>
        <div id="movimientos" class="contenedorTablas">
            <table id="tablaMovimientos">
                <tr>
                    <th>fecha</th>
                    <th>mensaje</th>
                    <th>monto</th>
                </tr>
            </table>
        </div>
    </div>
    <div id="inferior" class="contenedorHUD animacion1">
        <button id="btnProducto">
            <p>Agregar producto</p>
        </button>
        <button id="btnMovimiento">
            <p>Agregar movimiento</p>
        </button>
    </div>
    <script src="script.js"></script>
</body>
